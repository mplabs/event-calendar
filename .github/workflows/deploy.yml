name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
        working-directory: services/scraper
      - run: pytest tests/ -q
        working-directory: services/scraper

  schema-drift:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: events
          POSTGRES_PASSWORD: events
          POSTGRES_DB: events
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U events"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations
        env:
          PGPASSWORD: events
        run: |
          for f in db/migrations/*.sql; do
            echo "applying $f"
            psql -h localhost -U events -d events -v ON_ERROR_STOP=1 -f "$f"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
        working-directory: services/web

      # db pull rewrites the datasource block (url + comments), so keep our
      # committed header (placeholder url) and only refresh the models from the DB.
      - name: Regenerate models from DB
        working-directory: services/web
        run: |
          awk '/^model /{exit} {print}' prisma/schema.prisma > /tmp/head.prisma
          npx prisma db pull --url "postgresql://events:events@localhost:5432/events"
          awk 'f||/^model /{f=1} f' prisma/schema.prisma > /tmp/models.prisma
          cat /tmp/head.prisma /tmp/models.prisma > prisma/schema.prisma

      - name: Fail on schema drift
        run: git diff --exit-code services/web/prisma/schema.prisma

  deploy:
    needs: [test, schema-drift]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:

      - name: Run migrations
        run: ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} migrate

      - name: Deploy
        run: ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} deploy
