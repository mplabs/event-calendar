# Source registry. One entry per source. The pipeline is config-driven so most
# sources need no code. Verify the `legal` block (robots.txt / ToS / contact)
# before enabling a source in production.
#
# fetch.type:
#   sitemap  -> TYPO3/similar: discover event URLs via sitemap, then fetch each
#               static detail page. Set sitemap_url to the index sitemap.
#   html     -> static HTML page (fetched with httpx, cleaned, sent to the LLM)
#   feed     -> RSS or iCal feed (cheap, reliable; always prefer if available)
#   headless -> JS-rendered page (Playwright) [Phase 3]

sources:
  # --- jena-veranstaltungen.de (JenaKultur official calendar) ----------------
  # TYPO3 site. The listing page is JS-rendered (Vue component), but individual
  # event detail pages ARE static server-side rendered HTML. Strategy: fetch
  # sitemap.xml to discover all /event/<slug> URLs (with lastmod for change
  # detection), then fetch each detail page for LLM extraction.
  # robots.txt: Disallow: /fileadmin, /uploads — event pages NOT disallowed.
  - id: jena-veranstaltungen
    name: Veranstaltungskalender Jena (JenaKultur)
    region: jena
    enabled: true
    fetch:
      type: sitemap
      # Stable entry point: the sitemap index always lists the event sub-sitemap.
      sitemap_url: https://www.jena-veranstaltungen.de/sitemap.xml
      # Event sub-sitemap is identified by this URL fragment (TYPO3 param).
      sitemap_filter: ndsdestinationdataevent
      # CSS selector to narrow LLM input on each event detail page.
      content_selector: main
    legal:
      robots_ok: true         # robots.txt disallows /fileadmin, /uploads only
      feed: false
      rate_limit_s: 3
      contact: "https://www.jena-veranstaltungen.de/kontakt"

  # --- c-keller.de (C-Keller & Galerie Markt 21, Jena) ----------------------
  # Old REDAXO CMS. No robots.txt (returns 404 → no Disallow rules in effect).
  # No RSS/iCal. Konzerte page is static HTML with a simple date+title format:
  #   "DD Mon\nTitle\nDescription\n[» link]"
  - id: c-keller
    name: C-Keller Jena
    region: jena
    enabled: true
    fetch:
      type: html
      url: https://www.c-keller.de/index.php?article_id=513
      # col2_content contains the concert list with #cal date + #textumschluss title blocks.
      content_selector: "#col2_content"
    legal:
      robots_ok: true         # No robots.txt; treating as unrestricted
      feed: false
      rate_limit_s: 5
      contact: "https://www.c-keller.de/index.php?article_id=5"

  # Candidate sources to add next (verify legal + structure first):
