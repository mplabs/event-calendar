# Single-VPS deployment. Bring up the DB + apply migrations, then run the
# scraper on demand or via cron (see the `scrape` profile below).
#
#   cp .env.example .env   # then edit secrets
#   docker compose up -d db
#   docker compose run --rm migrate
#   docker compose run --rm scraper run-source kassablanca
#
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply SQL migrations in db/migrations in lexical order.
  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/migrations:/migrations:ro
      - ./db/migrate.sh:/migrate.sh:ro
    entrypoint: ["bash", "/migrate.sh"]

  # Python ingestion service. `command` is passed to the eventscraper CLI.
  scraper:
    build: ./services/scraper
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./sources.yaml:/app/sources.yaml:ro
      - raw_cache:/app/raw_cache
    entrypoint: ["python", "-m", "eventscraper.cli"]
    command: ["run-all"]

  # TypeScript / Next.js app (API + UI).
  web:
    build: ./services/web
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    networks:
      - default
      - webproxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=webproxy"
      - "traefik.http.routers.events.rule=Host(`${EVENTS_DOMAIN:?set EVENTS_DOMAIN in .env}`)"
      - "traefik.http.routers.events.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.events.tls=true"
      - "traefik.http.routers.events.tls.certresolver=${TRAEFIK_CERTRESOLVER:-dns}"
      - "traefik.http.routers.events.tls.domains[0].main=${EVENTS_DOMAIN}"
      - "traefik.http.routers.events.tls.domains[0].sans=${EVENTS_DOMAIN}"
      - "traefik.http.services.events.loadbalancer.server.port=3000"

networks:
  webproxy:
    external: true

volumes:
  pgdata:
  raw_cache:
